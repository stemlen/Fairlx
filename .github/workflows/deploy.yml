name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APPWRITE_ENDPOINT: ${{ vars.NEXT_PUBLIC_APPWRITE_ENDPOINT }}
          NEXT_PUBLIC_APPWRITE_PROJECT: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT }}
          NEXT_APPWRITE_KEY: ${{ secrets.NEXT_APPWRITE_KEY }}
          NEXT_PUBLIC_APPWRITE_DATABASE_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_DATABASE_ID }}
          # Organizations & Account Management
          NEXT_PUBLIC_APPWRITE_ORGANIZATIONS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_ORGANIZATIONS_ID }}
          NEXT_PUBLIC_APPWRITE_ORGANIZATION_MEMBERS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_ORGANIZATION_MEMBERS_ID }}
          NEXT_PUBLIC_APPWRITE_LOGIN_TOKENS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_LOGIN_TOKENS_ID }}
          # Workspaces & Members
          NEXT_PUBLIC_APPWRITE_WORKSPACES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_WORKSPACES_ID }}
          NEXT_PUBLIC_APPWRITE_MEMBERS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_MEMBERS_ID }}
          NEXT_PUBLIC_APPWRITE_PROJECT_MEMBERS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_MEMBERS_ID }}
          NEXT_PUBLIC_APPWRITE_PROJECTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECTS_ID }}
          NEXT_PUBLIC_APPWRITE_PROJECT_ROLES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_ROLES_ID }}
          NEXT_PUBLIC_APPWRITE_TASKS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_TASKS_ID }}
          NEXT_PUBLIC_APPWRITE_TIME_LOGS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_TIME_LOGS_ID }}
          NEXT_PUBLIC_APPWRITE_SPRINTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_SPRINTS_ID }}
          NEXT_PUBLIC_APPWRITE_WORK_ITEMS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_WORK_ITEMS_ID }}
          NEXT_PUBLIC_APPWRITE_PERSONAL_BACKLOG_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PERSONAL_BACKLOG_ID }}
          NEXT_PUBLIC_APPWRITE_CUSTOM_COLUMNS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_CUSTOM_COLUMNS_ID }}
          NEXT_PUBLIC_APPWRITE_DEFAULT_COLUMN_SETTINGS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_DEFAULT_COLUMN_SETTINGS_ID }}
          NEXT_PUBLIC_APPWRITE_NOTIFICATIONS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_NOTIFICATIONS_ID }}
          NEXT_PUBLIC_APPWRITE_IMAGES_BUCKET_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_IMAGES_BUCKET_ID }}
          NEXT_PUBLIC_APPWRITE_ATTACHMENTS_BUCKET_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_ATTACHMENTS_BUCKET_ID }}
          NEXT_PUBLIC_APPWRITE_ATTACHMENTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_ATTACHMENTS_ID }}
          NEXT_PUBLIC_APPWRITE_COMMENTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_COMMENTS_ID }}
          NEXT_PUBLIC_APPWRITE_PROJECT_DOCS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_DOCS_ID }}
          NEXT_PUBLIC_APPWRITE_PROJECT_DOCS_BUCKET_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_DOCS_BUCKET_ID }}
          NEXT_PUBLIC_APPWRITE_AUDIT_LOGS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_AUDIT_LOGS_ID }}
          NEXT_PUBLIC_APPWRITE_ORGANIZATION_AUDIT_LOGS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_ORGANIZATION_AUDIT_LOGS_ID }}
          NEXT_PUBLIC_APPWRITE_DEPARTMENTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_DEPARTMENTS_ID }}
          NEXT_PUBLIC_APPWRITE_ORG_MEMBER_DEPARTMENTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_ORG_MEMBER_DEPARTMENTS_ID }}
          NEXT_PUBLIC_APPWRITE_ORG_MEMBER_PERMISSIONS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_ORG_MEMBER_PERMISSIONS_ID }}
          NEXT_PUBLIC_APPWRITE_DEPARTMENT_PERMISSIONS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_DEPARTMENT_PERMISSIONS_ID }}
          # Usage 
          NEXT_PUBLIC_APPWRITE_USAGE_EVENTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_USAGE_EVENTS_ID }}
          NEXT_PUBLIC_APPWRITE_USAGE_AGGREGATIONS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_USAGE_AGGREGATIONS_ID }}
          NEXT_PUBLIC_APPWRITE_USAGE_ALERTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_USAGE_ALERTS_ID }}
          BILLING_GRACE_PERIOD_DAYS: ${{ vars.BILLING_GRACE_PERIOD_DAYS }}
          BILLING_CURRENCY: ${{ vars.BILLING_CURRENCY }}
          USAGE_RATE_TRAFFIC_GB: ${{ vars.USAGE_RATE_TRAFFIC_GB }}
          USAGE_RATE_STORAGE_GB_MONTH: ${{ vars.USAGE_RATE_STORAGE_GB_MONTH }}
          USAGE_RATE_COMPUTE_UNIT: ${{ vars.USAGE_RATE_COMPUTE_UNIT }}
          # Billing & Invoicing
          NEXT_PUBLIC_APPWRITE_BILLING_ACCOUNTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_BILLING_ACCOUNTS_ID }}
          NEXT_PUBLIC_APPWRITE_BILLING_AUDIT_LOGS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_BILLING_AUDIT_LOGS_ID }}
          NEXT_PUBLIC_APPWRITE_STORAGE_SNAPSHOTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_STORAGE_SNAPSHOTS_ID }}
          NEXT_PUBLIC_APPWRITE_INVOICES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_INVOICES_ID }}
          NEXT_PUBLIC_APPWRITE_PROCESSED_EVENTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROCESSED_EVENTS_ID }}
          NEXT_PUBLIC_APPWRITE_BILLING_SETTINGS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_BILLING_SETTINGS_ID }}
          # Payment Processing & Currency
          # Primary currency: USD (for display & wallet storage)
          # Cashfree charges: INR (converted at checkout using live rates)
          # EXCHANGE_RATE_API_KEY enables live USD→INR conversion
          CASHFREE_APP_ID: ${{ vars.CASHFREE_APP_ID }}
          CASHFREE_SECRET_KEY: ${{ secrets.CASHFREE_SECRET_KEY }}
          CASHFREE_WEBHOOK_SECRET: ${{ secrets.CASHFREE_WEBHOOK_SECRET }}
          CASHFREE_ENV: ${{ vars.CASHFREE_ENV }}
          EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
          ENABLE_EMANDATE: ${{ vars.ENABLE_EMANDATE }}
          # Wallet
          NEXT_PUBLIC_APPWRITE_WALLETS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_WALLETS_ID }}
          NEXT_PUBLIC_APPWRITE_WALLET_TRANSACTIONS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_WALLET_TRANSACTIONS_ID }}
          NEXT_PUBLIC_APPWRITE_USAGE_DEDUCTIONS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_USAGE_DEDUCTIONS_ID }}
          WALLET_SIG_SECRET: ${{ secrets.WALLET_SIG_SECRET }}
          WALLET_DAILY_TOPUP_LIMIT: ${{ vars.WALLET_DAILY_TOPUP_LIMIT }}
          # Cron & Auth
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_APPWRITE_VERIFICATION_TOKENS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_VERIFICATION_TOKENS_ID }}
          # Email
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          NEXT_PUBLIC_APPWRITE_SMTP_PROVIDER_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_SMTP_PROVIDER_ID }}
          NEXT_PUBLIC_APPWRITE_EMAIL_TOPIC_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_EMAIL_TOPIC_ID }}
          # GitHub Integration
          NEXT_PUBLIC_APPWRITE_GITHUB_REPOS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_GITHUB_REPOS_ID }}
          NEXT_PUBLIC_APPWRITE_CODE_DOCS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_CODE_DOCS_ID }}
          GH_PERSONAL_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
          # Gemini AI
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Teams & Programs
          NEXT_PUBLIC_APPWRITE_PROJECT_TEAMS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_TEAMS_ID }}
          NEXT_PUBLIC_APPWRITE_PROJECT_TEAM_MEMBERS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_TEAM_MEMBERS_ID }}
          NEXT_PUBLIC_APPWRITE_PROJECT_PERMISSIONS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_PERMISSIONS_ID }}
          NEXT_PUBLIC_APPWRITE_PROGRAMS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROGRAMS_ID }}
          NEXT_PUBLIC_APPWRITE_PROGRAM_MEMBERS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROGRAM_MEMBERS_ID }}
          NEXT_PUBLIC_APPWRITE_PROGRAM_MILESTONES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROGRAM_MILESTONES_ID }}
          NEXT_PUBLIC_APPWRITE_CUSTOM_ROLES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_CUSTOM_ROLES_ID }}
          # Spaces & Workflows
          NEXT_PUBLIC_APPWRITE_SPACES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_SPACES_ID }}
          NEXT_PUBLIC_APPWRITE_SPACE_MEMBERS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_SPACE_MEMBERS_ID }}
          NEXT_PUBLIC_APPWRITE_WORKFLOWS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_WORKFLOWS_ID }}
          NEXT_PUBLIC_APPWRITE_WORKFLOW_STATUSES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_WORKFLOW_STATUSES_ID }}
          NEXT_PUBLIC_APPWRITE_WORKFLOW_TRANSITIONS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_WORKFLOW_TRANSITIONS_ID }}
          # Custom Fields & Work Items
          NEXT_PUBLIC_APPWRITE_CUSTOM_FIELDS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_CUSTOM_FIELDS_ID }}
          NEXT_PUBLIC_APPWRITE_CUSTOM_WORK_ITEM_TYPES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_CUSTOM_WORK_ITEM_TYPES_ID }}
          NEXT_PUBLIC_APPWRITE_WORK_ITEM_LINKS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_WORK_ITEM_LINKS_ID }}
          NEXT_PUBLIC_APPWRITE_SAVED_VIEWS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_SAVED_VIEWS_ID }}
          NEXT_PUBLIC_APPWRITE_SUBTASKS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_SUBTASKS_ID }}
          # Landing Page (Supabase)
          LANDING_SUPABASE_URL: ${{ secrets.LANDING_SUPABASE_URL }}
          LANDING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.LANDING_SUPABASE_SERVICE_ROLE_KEY }}

          # Webhooks
          NEXT_PUBLIC_APPWRITE_PROJECT_WEBHOOKS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_WEBHOOKS_ID }}
          NEXT_PUBLIC_APPWRITE_PROJECT_WEBHOOK_DELIVERIES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_WEBHOOK_DELIVERIES_ID }}
          NEXT_PUBLIC_APPWRITE_BYOB_TENANTS_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_BYOB_TENANTS_ID }}

          # Two-Factor Authentication (2FA)
          NEXT_PUBLIC_APPWRITE_USER_RECOVERY_CODES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_USER_RECOVERY_CODES_ID }}
          NEXT_PUBLIC_APPWRITE_EMAIL_OTP_CODES_ID: ${{ vars.NEXT_PUBLIC_APPWRITE_EMAIL_OTP_CODES_ID }}
          TWO_FACTOR_ENCRYPTION_SECRET: ${{ secrets.TWO_FACTOR_ENCRYPTION_SECRET }}
          BYOB_ENCRYPTION_SECRET: ${{ secrets.BYOB_ENCRYPTION_SECRET }}
          # Socket.IO
          SOCKET_PUSH_SECRET: ${{ secrets.SOCKET_PUSH_SECRET }}
          # Cloudflare R2 Storage (production)
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
          # Redis (server-side caching layer)
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: npm run build

      - name: Clean up before transfer
        run: |
          # Remove .git (not needed on server, causes permission errors)
          rm -rf .git

      - name: Transfer files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: 22
          source: "."
          target: "/var/www/fairlx"
          overwrite: true

      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: 22
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/fairlx

            # ── 1. Write .env.local ──
            cat > .env.local << 'ENVEOF'
            NODE_ENV=production
            ENVEOF
            # Use tee to append secrets (heredoc above is just the header)
            cat > .env.local << EOF
            NODE_ENV=production
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_APPWRITE_ENDPOINT=${{ vars.NEXT_PUBLIC_APPWRITE_ENDPOINT }}
            NEXT_PUBLIC_APPWRITE_PROJECT=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT }}
            NEXT_APPWRITE_KEY=${{ secrets.NEXT_APPWRITE_KEY }}
            NEXT_PUBLIC_APPWRITE_DATABASE_ID=${{ vars.NEXT_PUBLIC_APPWRITE_DATABASE_ID }}
            NEXT_PUBLIC_APPWRITE_ORGANIZATIONS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_ORGANIZATIONS_ID }}
            NEXT_PUBLIC_APPWRITE_ORGANIZATION_MEMBERS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_ORGANIZATION_MEMBERS_ID }}
            NEXT_PUBLIC_APPWRITE_LOGIN_TOKENS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_LOGIN_TOKENS_ID }}
            NEXT_PUBLIC_APPWRITE_WORKSPACES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_WORKSPACES_ID }}
            NEXT_PUBLIC_APPWRITE_MEMBERS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_MEMBERS_ID }}
            NEXT_PUBLIC_APPWRITE_PROJECT_MEMBERS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_MEMBERS_ID }}
            NEXT_PUBLIC_APPWRITE_PROJECTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECTS_ID }}
            NEXT_PUBLIC_APPWRITE_PROJECT_ROLES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_ROLES_ID }}
            NEXT_PUBLIC_APPWRITE_TASKS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_TASKS_ID }}
            NEXT_PUBLIC_APPWRITE_TIME_LOGS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_TIME_LOGS_ID }}
            NEXT_PUBLIC_APPWRITE_SPRINTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_SPRINTS_ID }}
            NEXT_PUBLIC_APPWRITE_WORK_ITEMS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_WORK_ITEMS_ID }}
            NEXT_PUBLIC_APPWRITE_PERSONAL_BACKLOG_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PERSONAL_BACKLOG_ID }}
            NEXT_PUBLIC_APPWRITE_CUSTOM_COLUMNS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_CUSTOM_COLUMNS_ID }}
            NEXT_PUBLIC_APPWRITE_DEFAULT_COLUMN_SETTINGS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_DEFAULT_COLUMN_SETTINGS_ID }}
            NEXT_PUBLIC_APPWRITE_NOTIFICATIONS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_NOTIFICATIONS_ID }}
            NEXT_PUBLIC_APPWRITE_IMAGES_BUCKET_ID=${{ vars.NEXT_PUBLIC_APPWRITE_IMAGES_BUCKET_ID }}
            NEXT_PUBLIC_APPWRITE_ATTACHMENTS_BUCKET_ID=${{ vars.NEXT_PUBLIC_APPWRITE_ATTACHMENTS_BUCKET_ID }}
            NEXT_PUBLIC_APPWRITE_ATTACHMENTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_ATTACHMENTS_ID }}
            NEXT_PUBLIC_APPWRITE_COMMENTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_COMMENTS_ID }}
            NEXT_PUBLIC_APPWRITE_PROJECT_DOCS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_DOCS_ID }}
            NEXT_PUBLIC_APPWRITE_PROJECT_DOCS_BUCKET_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_DOCS_BUCKET_ID }}
            NEXT_PUBLIC_APPWRITE_AUDIT_LOGS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_AUDIT_LOGS_ID }}
            NEXT_PUBLIC_APPWRITE_ORGANIZATION_AUDIT_LOGS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_ORGANIZATION_AUDIT_LOGS_ID }}
            NEXT_PUBLIC_APPWRITE_DEPARTMENTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_DEPARTMENTS_ID }}
            NEXT_PUBLIC_APPWRITE_ORG_MEMBER_DEPARTMENTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_ORG_MEMBER_DEPARTMENTS_ID }}
            NEXT_PUBLIC_APPWRITE_ORG_MEMBER_PERMISSIONS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_ORG_MEMBER_PERMISSIONS_ID }}
            NEXT_PUBLIC_APPWRITE_DEPARTMENT_PERMISSIONS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_DEPARTMENT_PERMISSIONS_ID }}
            NEXT_PUBLIC_APPWRITE_USAGE_EVENTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_USAGE_EVENTS_ID }}
            NEXT_PUBLIC_APPWRITE_USAGE_AGGREGATIONS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_USAGE_AGGREGATIONS_ID }}
            NEXT_PUBLIC_APPWRITE_USAGE_ALERTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_USAGE_ALERTS_ID }}
            BILLING_GRACE_PERIOD_DAYS=${{ vars.BILLING_GRACE_PERIOD_DAYS }}
            BILLING_CURRENCY=${{ vars.BILLING_CURRENCY }}
            USAGE_RATE_TRAFFIC_GB=${{ vars.USAGE_RATE_TRAFFIC_GB }}
            USAGE_RATE_STORAGE_GB_MONTH=${{ vars.USAGE_RATE_STORAGE_GB_MONTH }}
            USAGE_RATE_COMPUTE_UNIT=${{ vars.USAGE_RATE_COMPUTE_UNIT }}
            NEXT_PUBLIC_APPWRITE_BILLING_ACCOUNTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_BILLING_ACCOUNTS_ID }}
            NEXT_PUBLIC_APPWRITE_BILLING_AUDIT_LOGS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_BILLING_AUDIT_LOGS_ID }}
            NEXT_PUBLIC_APPWRITE_STORAGE_SNAPSHOTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_STORAGE_SNAPSHOTS_ID }}
            NEXT_PUBLIC_APPWRITE_INVOICES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_INVOICES_ID }}
            NEXT_PUBLIC_APPWRITE_PROCESSED_EVENTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROCESSED_EVENTS_ID }}
            NEXT_PUBLIC_APPWRITE_BILLING_SETTINGS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_BILLING_SETTINGS_ID }}
            CASHFREE_APP_ID=${{ vars.CASHFREE_APP_ID }}
            CASHFREE_SECRET_KEY=${{ secrets.CASHFREE_SECRET_KEY }}
            CASHFREE_WEBHOOK_SECRET=${{ secrets.CASHFREE_WEBHOOK_SECRET }}
            CASHFREE_ENV=${{ vars.CASHFREE_ENV }}
            EXCHANGE_RATE_API_KEY=${{ secrets.EXCHANGE_RATE_API_KEY }}
            ENABLE_EMANDATE=${{ vars.ENABLE_EMANDATE }}
            NEXT_PUBLIC_APPWRITE_WALLETS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_WALLETS_ID }}
            NEXT_PUBLIC_APPWRITE_WALLET_TRANSACTIONS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_WALLET_TRANSACTIONS_ID }}
            NEXT_PUBLIC_APPWRITE_USAGE_DEDUCTIONS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_USAGE_DEDUCTIONS_ID }}
            WALLET_SIG_SECRET=${{ secrets.WALLET_SIG_SECRET }}
            WALLET_DAILY_TOPUP_LIMIT=${{ vars.WALLET_DAILY_TOPUP_LIMIT }}
            CRON_SECRET=${{ secrets.CRON_SECRET }}
            NEXT_PUBLIC_APPWRITE_VERIFICATION_TOKENS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_VERIFICATION_TOKENS_ID }}
            EMAIL_FROM=${{ vars.EMAIL_FROM }}
            NEXT_PUBLIC_APPWRITE_SMTP_PROVIDER_ID=${{ vars.NEXT_PUBLIC_APPWRITE_SMTP_PROVIDER_ID }}
            NEXT_PUBLIC_APPWRITE_EMAIL_TOPIC_ID=${{ vars.NEXT_PUBLIC_APPWRITE_EMAIL_TOPIC_ID }}
            NEXT_PUBLIC_APPWRITE_GITHUB_REPOS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_GITHUB_REPOS_ID }}
            NEXT_PUBLIC_APPWRITE_CODE_DOCS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_CODE_DOCS_ID }}
            GH_PERSONAL_TOKEN=${{ secrets.GH_PERSONAL_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            NEXT_PUBLIC_APPWRITE_PROJECT_TEAMS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_TEAMS_ID }}
            NEXT_PUBLIC_APPWRITE_PROJECT_TEAM_MEMBERS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_TEAM_MEMBERS_ID }}
            NEXT_PUBLIC_APPWRITE_PROJECT_PERMISSIONS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_PERMISSIONS_ID }}
            NEXT_PUBLIC_APPWRITE_PROGRAMS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROGRAMS_ID }}
            NEXT_PUBLIC_APPWRITE_PROGRAM_MEMBERS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROGRAM_MEMBERS_ID }}
            NEXT_PUBLIC_APPWRITE_PROGRAM_MILESTONES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROGRAM_MILESTONES_ID }}
            NEXT_PUBLIC_APPWRITE_CUSTOM_ROLES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_CUSTOM_ROLES_ID }}
            NEXT_PUBLIC_APPWRITE_SPACES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_SPACES_ID }}
            NEXT_PUBLIC_APPWRITE_SPACE_MEMBERS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_SPACE_MEMBERS_ID }}
            NEXT_PUBLIC_APPWRITE_WORKFLOWS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_WORKFLOWS_ID }}
            NEXT_PUBLIC_APPWRITE_WORKFLOW_STATUSES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_WORKFLOW_STATUSES_ID }}
            NEXT_PUBLIC_APPWRITE_WORKFLOW_TRANSITIONS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_WORKFLOW_TRANSITIONS_ID }}
            NEXT_PUBLIC_APPWRITE_CUSTOM_FIELDS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_CUSTOM_FIELDS_ID }}
            NEXT_PUBLIC_APPWRITE_CUSTOM_WORK_ITEM_TYPES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_CUSTOM_WORK_ITEM_TYPES_ID }}
            NEXT_PUBLIC_APPWRITE_WORK_ITEM_LINKS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_WORK_ITEM_LINKS_ID }}
            NEXT_PUBLIC_APPWRITE_SAVED_VIEWS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_SAVED_VIEWS_ID }}
            NEXT_PUBLIC_APPWRITE_SUBTASKS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_SUBTASKS_ID }}
            LANDING_SUPABASE_URL=${{ secrets.LANDING_SUPABASE_URL }}
            LANDING_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.LANDING_SUPABASE_SERVICE_ROLE_KEY }}
            NEXT_PUBLIC_APPWRITE_PROJECT_WEBHOOKS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_WEBHOOKS_ID }}
            NEXT_PUBLIC_APPWRITE_PROJECT_WEBHOOK_DELIVERIES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_PROJECT_WEBHOOK_DELIVERIES_ID }}
            NEXT_PUBLIC_APPWRITE_BYOB_TENANTS_ID=${{ vars.NEXT_PUBLIC_APPWRITE_BYOB_TENANTS_ID }}
            NEXT_PUBLIC_APPWRITE_USER_RECOVERY_CODES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_USER_RECOVERY_CODES_ID }}
            NEXT_PUBLIC_APPWRITE_EMAIL_OTP_CODES_ID=${{ vars.NEXT_PUBLIC_APPWRITE_EMAIL_OTP_CODES_ID }}
            TWO_FACTOR_ENCRYPTION_SECRET=${{ secrets.TWO_FACTOR_ENCRYPTION_SECRET }}
            BYOB_ENCRYPTION_SECRET=${{ secrets.BYOB_ENCRYPTION_SECRET }}
            SOCKET_PUSH_SECRET=${{ secrets.SOCKET_PUSH_SECRET }}
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET_NAME=${{ vars.R2_BUCKET_NAME }}
            R2_PUBLIC_URL=${{ vars.R2_PUBLIC_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EOF
            chmod 600 .env.local

            # ── 2. Install dependencies ──
            npm install --prefer-offline --no-audit --no-fund

            # ── 3. Verify Redis ──
            redis-cli -a "${{ secrets.REDIS_PASSWORD }}" PING || echo 'WARNING: Redis not responding'

            # ── 4. Graceful PM2 restart (runs as root via sudo) ──
            # ecosystem.config.js is already transferred via SCP with the code.
            # It uses the Next.js binary directly to avoid child-process issues.
            sudo pm2 reload fairlx --update-env 2>/dev/null \
              || sudo pm2 start /var/www/fairlx/ecosystem.config.js

            # Wait for Next.js to be ready
            echo "Waiting for app to start..."
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:3000/ > /dev/null 2>&1; then
                echo "✅ App is live on port 3000"
                break
              fi
              sleep 2
            done

            # ── 5. Save PM2 state (survives reboot) ──
            sudo pm2 save

            # ── 6. Show status ──
            sudo pm2 list

            echo "✅ Deployment completed successfully!"
